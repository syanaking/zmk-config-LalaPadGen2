# LaLaPad Gen2 物理レイアウト定義
# キーの x/y 座標（単位：キー幅）
#
# 配置概要:
#   Row 0-2 : メインキー 5L + 5R（gap x=5-6 が分割部）
#   Thumb   : 親指段 6L + 6R
#   Nav     : ナビ段 5L + 5R（外側 1 列ずつオフセット）
#   TP Btn  : トラックパッドボタン 3L + 3R（両端）
#   Swipe   : スワイプ操作 5L + 5R

keys:
  # ── Row 0 : Q W E R T | Y U I O P ──────────────────────────
  - {x: 0,  y: 0}   # Q
  - {x: 1,  y: 0}   # W
  - {x: 2,  y: 0}   # E
  - {x: 3,  y: 0}   # R
  - {x: 4,  y: 0}   # T
  - {x: 7,  y: 0}   # Y
  - {x: 8,  y: 0}   # U
  - {x: 9,  y: 0}   # I
  - {x: 10, y: 0}   # O
  - {x: 11, y: 0}   # P

  # ── Row 1 : A S D F G | H J K L ; ──────────────────────────
  - {x: 0,  y: 1}   # A
  - {x: 1,  y: 1}   # S
  - {x: 2,  y: 1}   # D
  - {x: 3,  y: 1}   # F
  - {x: 4,  y: 1}   # G
  - {x: 7,  y: 1}   # H
  - {x: 8,  y: 1}   # J
  - {x: 9,  y: 1}   # K
  - {x: 10, y: 1}   # L
  - {x: 11, y: 1}   # ;

  # ── Row 2 : Z X C V B | N M , . / ──────────────────────────
  - {x: 0,  y: 2}   # Z
  - {x: 1,  y: 2}   # X
  - {x: 2,  y: 2}   # C
  - {x: 3,  y: 2}   # V
  - {x: 4,  y: 2}   # B
  - {x: 7,  y: 2}   # N
  - {x: 8,  y: 2}   # M
  - {x: 9,  y: 2}   # ,
  - {x: 10, y: 2}   # .
  - {x: 11, y: 2}   # /

  # ── Thumb : LCTL lt3/ESC LWIN ALT lt1/SPC lt2/TAB | LSft BSP lt2/TAB lt1/SPC lt3/全 ENT ──
  - {x: 0,  y: 3.5}  # LCTL
  - {x: 1,  y: 3.5}  # lt3/ESC
  - {x: 2,  y: 3.5}  # LWIN
  - {x: 3,  y: 3.5}  # ALT
  - {x: 4,  y: 3.5}  # lt1/SPC
  - {x: 5,  y: 3.5}  # lt2/TAB
  - {x: 6,  y: 3.5}  # Shift
  - {x: 7,  y: 3.5}  # BSP
  - {x: 8,  y: 3.5}  # lt2/TAB
  - {x: 9,  y: 3.5}  # lt1/SPC
  - {x: 10, y: 3.5}  # lt3/全
  - {x: 11, y: 3.5}  # ENT

  # ── Nav : LANG2 → ↓ ← ↑ | ↑ ← ↓ → LANG1 ──────────────────
  - {x: 1,  y: 4.75}  # LANG2
  - {x: 2,  y: 4.75}  # →
  - {x: 3,  y: 4.75}  # ↓
  - {x: 4,  y: 4.75}  # ←
  - {x: 5,  y: 4.75}  # ↑
  - {x: 6,  y: 4.75}  # ↑
  - {x: 7,  y: 4.75}  # ←
  - {x: 8,  y: 4.75}  # ↓
  - {x: 9,  y: 4.75}  # →
  - {x: 10, y: 4.75}  # LANG1

  # ── Trackpad Buttons : LC RC MC | LC RC MC ───────────────────
  - {x: 0,  y: 6.25}  # LC (L)
  - {x: 1,  y: 6.25}  # RC (L)
  - {x: 2,  y: 6.25}  # MC (L)
  - {x: 9,  y: 6.25}  # LC (R)
  - {x: 10, y: 6.25}  # RC (R)
  - {x: 11, y: 6.25}  # MC (R)

  # ── Swipe : MB4 MB5 W+Tab W+D LCTL | MB4 MB5 W+Tab W+D LCTL ─
  - {x: 0,  y: 7.25}  # MB4 (Back)
  - {x: 1,  y: 7.25}  # MB5 (Forward)
  - {x: 2,  y: 7.25}  # Win+Tab
  - {x: 3,  y: 7.25}  # Win+D
  - {x: 4,  y: 7.25}  # LCTL
  - {x: 7,  y: 7.25}  # MB4
  - {x: 8,  y: 7.25}  # MB5
  - {x: 9,  y: 7.25}  # Win+Tab
  - {x: 10, y: 7.25}  # Win+D
  - {x: 11, y: 7.25}  # LCTL
