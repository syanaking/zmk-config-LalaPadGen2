name: Draw keymap

on:
  push:
    paths:
      - "config/*.keymap"
      - "config/keymap_drawer.config.yaml"
      - "config/lalapadgen2_layout.yaml"
      - ".github/workflows/draw-keymaps.yml"
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Create output directory
        run: mkdir -p keymap-drawer

      - name: Parse keymap
        run: |
          keymap -c config/keymap_drawer.config.yaml \
            parse -z config/lalapadgen2.keymap \
            > keymap-drawer/lalapadgen2.yaml

      - name: Inject custom layout into parsed YAML
        run: |
          python3 - <<'EOF'
          import yaml, os

          with open('keymap-drawer/lalapadgen2.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)

          # layout spec: qmk_info_json + qmk_layout
          # パスをワークフロー実行ディレクトリ（リポジトリルート）からの絶対パスに変換
          cwd = os.getcwd()
          layout = {
              'qmk_info_json': os.path.join(cwd, 'config', 'lalapadgen2_info.json'),
              'qmk_layout': 'LAYOUT',
          }

          data['layout'] = layout

          with open('keymap-drawer/lalapadgen2.yaml', 'w', encoding='utf-8') as f:
              yaml.dump(data, f, allow_unicode=True, default_flow_style=False)

          print("Layout injected:", layout)
          EOF

      - name: Draw keymap
        run: |
          keymap -c config/keymap_drawer.config.yaml \
            draw \
            keymap-drawer/lalapadgen2.yaml \
            > keymap-drawer/lalapadgen2.svg

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-drawer/
          git diff --staged --quiet || git commit -m "ci: update keymap drawings [skip ci]"
          git push
