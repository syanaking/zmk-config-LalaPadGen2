name: Draw keymap

on:
  push:
    paths:
      - "config/*.keymap"
      - "config/keymap_drawer.config.yaml"
      - "config/lalapadgen2_layout.yaml"
      - ".github/workflows/draw-keymaps.yml"
  workflow_dispatch:

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      keymap_patterns: "config/*.keymap"
      config_path: "config/keymap_drawer.config.yaml"
      output_folder: "keymap-drawer"
      draw_args: "lalapadgen2:'--layout config/lalapadgen2_layout.yaml'"
